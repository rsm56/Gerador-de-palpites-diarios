<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA RJ v35 - BACKUP RECUPERADO</title>
    <style>
        :root { --primary: #2c3e50; --accent: #27ae60; --blue: #2980b9; --warning: #f39c12; --danger: #e74c3c; --bg: #ecf0f1; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding-bottom: 80px; }
        
        .tabs { display: flex; position: fixed; bottom: 0; width: 100%; background: var(--primary); z-index: 1000; }
        .tab-btn { flex: 1; padding: 18px; border: none; background: none; color: white; font-weight: bold; cursor: pointer; }
        .tab-btn.active { background: #34495e; border-top: 4px solid var(--accent); color: var(--accent); }
        
        .page { display: none; padding: 15px; max-width: 500px; margin: auto; }
        .page.active { display: block; }

        .header-box { text-align: center; background: var(--primary); color: white; padding: 15px; border-radius: 0 0 20px 20px; }
        #relogio { font-size: 1.8rem; font-weight: bold; font-family: monospace; }
        
        .card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h2 { font-size: 0.8rem; color: var(--primary); margin: 0 0 8px 0; border-bottom: 1px solid #eee; padding-bottom: 5px; text-transform: uppercase; }
        
        textarea { width: 100%; height: 70px; border: 1px solid #ccc; border-radius: 8px; padding: 8px; box-sizing: border-box; font-size: 1rem; background: #fafafa; }
        .btn-main { width: 100%; padding: 12px; border-radius: 8px; border: none; margin-top: 8px; font-weight: bold; font-size: 1rem; cursor: pointer; background: var(--accent); color: white; }

        /* UTILITÁRIOS BACKUP */
        .row-utils { display: flex; gap: 8px; margin-top: 15px; }
        .btn-util { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #ccc; background: white; font-weight: bold; font-size: 0.7rem; cursor: pointer; }

        /* PALPITES POPULARES */
        .palpite-box { border-left: 5px solid var(--blue); padding: 10px; background: #f9f9f9; border-radius: 0 8px 8px 0; margin-bottom: 10px; }
        .palpite-header { font-weight: bold; font-size: 1.1rem; color: #333; }
        .milhar-linha { font-family: monospace; font-size: 1rem; color: #d32f2f; font-weight: bold; letter-spacing: 1px; margin-top: 5px; }

        .list-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; margin-top: 10px; }
        .list-table td { padding: 8px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

<div class="header-box">
    <div id="relogio">00:00:00</div>
    <div id="display-cruz" style="font-size:0.9rem; color:var(--warning); margin-top:5px; font-weight:bold;">Cruz...</div>
</div>

<div id="aba-dados" class="page active">
    <div class="card" style="margin-top:10px;">
        <h2>📌 RANKING DE ATRASADOS</h2>
        <textarea id="atrasados" placeholder="Ex: 1, 25, 14..."></textarea>
        <button onclick="salvarRank()" class="btn-main" style="background:var(--primary)">SALVAR RANKING</button>
    </div>

    <div class="card">
        <h2>🕒 LANÇAR RESULTADO</h2>
        <div style="display: flex; gap: 5px;">
            <select id="horario" style="flex: 1.5; padding: 10px; border-radius: 8px; border: 1px solid #ccc;">
                <option value="0">09:30</option><option value="1">11:30</option>
                <option value="2">14:30</option><option value="3">16:30</option>
                <option value="4">18:30</option><option value="5">21:30</option>
            </select>
            <button onclick="lancar()" class="btn-main" style="margin-top:0; flex: 1;">LANÇAR</button>
        </div>
        <textarea id="res-input" placeholder="Cole o resultado aqui..." style="margin-top:8px;"></textarea>
        
        <table class="list-table"><tbody id="lista-lancamentos"></tbody></table>
        
        <div class="row-utils">
            <button class="btn-util" onclick="exportarBackup()">📤 EXPORTAR BACKUP</button>
            <button class="btn-util" onclick="document.getElementById('fIn').click()">📥 RESTAURAR</button>
            <input type="file" id="fIn" style="display:none" onchange="importarBackup(event)">
        </div>
        <button onclick="resetar()" style="width:100%; margin-top:15px; color:var(--danger); background:none; border:none; font-size:0.7rem; font-weight:bold; cursor:pointer;">LIMPAR TUDO (RESETAR DIA)</button>
    </div>
</div>

<div id="aba-palpites" class="page">
    <div class="card">
        <h2>⚙️ GERAR SUGESTÕES</h2>
        <select id="nivel-risco" style="width:100%; padding:12px; border-radius:8px; border: 1px solid #ccc;">
            <option value="equilibrado">EQUILIBRADO (Misto)</option>
            <option value="conservador">CONSERVADOR (Foco Atraso)</option>
            <option value="arriscado">ARRISCADO (Frequência)</option>
        </select>
        <button onclick="gerarPalpites()" class="btn-main" style="margin-top:10px;">🎯 GERAR 6 BICHOS + MILHARES</button>
    </div>
    <div id="container-palpites"></div>
</div>

<nav class="tabs">
    <button class="tab-btn active" onclick="showPage('aba-dados', this)">DADOS</button>
    <button class="tab-btn" onclick="showPage('aba-palpites', this)">PALPITES</button>
</nav>

<script>
    const ANIMAIS = ["Avestruz","Águia","Burro","Borboleta","Cachorro","Cabra","Carneiro","Camelo","Cobra","Coelho","Cavalo","Elefante","Galo","Gato","Jacaré","Leão","Macaco","Porco","Pavão","Peru","Touro","Tigre","Urso","Veado","Vaca"];
    let cruzGlobal = [];

    function timer() { document.getElementById('relogio').innerText = new Date().toLocaleTimeString('pt-BR'); }

    function calcCruz() {
        const dia = new Date().getDate();
        cruzGlobal = [(dia+3)%10, (dia+6)%10, (dia+9)%10, (dia+12)%10];
        document.getElementById('display-cruz').innerText = `CRUZ DO DIA: ${cruzGlobal.join(' - ')}`;
    }

    function fmt(n) { return n.toString().padStart(2, '0'); }

    // BACKUP FUNCIONAL
    function exportarBackup() {
        const d = { 
            rank: localStorage.getItem('rj_v34_rank'), 
            dados: localStorage.getItem('rj_v34_data') 
        };
        const blob = new Blob([JSON.stringify(d)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `backup_rj_v35_${new Date().getTime()}.json`;
        a.click();
        URL.revokeObjectURL(url);
    }

    function importarBackup(e) {
        const reader = new FileReader();
        reader.onload = (f) => {
            try {
                const d = JSON.parse(f.target.result);
                if(d.rank) localStorage.setItem('rj_v34_rank', d.rank);
                if(d.dados) localStorage.setItem('rj_v34_data', d.dados);
                alert("Backup restaurado com sucesso!");
                location.reload();
            } catch(err) { alert("Arquivo de backup inválido."); }
        };
        reader.readAsText(e.target.files[0]);
    }

    function gerarMilhares(grupo) {
        let dezenas = [];
        let base = (grupo - 1) * 4 + 1;
        for(let i=0; i<4; i++) {
            let num = base + i;
            if(num === 101) num = 0;
            dezenas.push(fmt(num));
        }
        return dezenas.map(d => (Math.floor(Math.random() * 90) + 10).toString() + d).join(' - ');
    }
